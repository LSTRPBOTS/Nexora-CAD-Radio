<!DOCTYPE html>
<html>
<head>
    <title>CAD</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        nav {
            background: #000;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
        }
        input, select, button, textarea {
            padding: 8px;
            margin-top: 8px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            width: 100%;
        }
        button {
            cursor: pointer;
        }
        #calls {
            margin-top: 20px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .call {
            border: 1px solid #444;
            padding: 8px;
            margin-top: 8px;
        }
        #panicBanner {
            background: darkred;
            padding: 10px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav>
    <a href="login.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
</nav>

<div class="container">
    <h1>CAD – Dispatch Console</h1>
    <div id="userInfo"></div>

    <h3>Create Call</h3>
    <input id="callType" placeholder="Call Type (Robbery, MVC, Fire, etc.)">
    <input id="callLocation" placeholder="Location">
    <textarea id="callDetails" placeholder="Details"></textarea>

    <label>Severity</label>
    <select id="callSeverity">
        <option value="normal">Normal</option>
        <option value="high">High Priority</option>
    </select>

    <button id="createCallBtn">Create Call</button>

    <div id="panicBanner"></div>

    <div id="calls">
        <h3>Active Calls</h3>
        <div id="callList"></div>
    </div>
</div>

<script>
    // ---------------- TTS + BEEPS ----------------
    function playKeyUp() {
        new Audio("/tones/unit_keyup.mp3").play();
    }

    function playUnkey() {
        new Audio("/tones/unit_unkey.mp3").play();
    }

    function speak(text, severity = "normal") {
        const msg = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
        msg.voice = maleVoice;

        if (severity === "high") {
            msg.rate = 1.2;
            msg.pitch = 0.9;
            msg.volume = 1;
        } else {
            msg.rate = 0.9;
            msg.pitch = 0.8;
            msg.volume = 0.9;
        }

        speechSynthesis.speak(msg);
    }

    function dispatchCallAudio(call) {
        playKeyUp();

        setTimeout(() => {
            const message = call.severity === "high"
                ? `ATTENTION ALL UNITS! ${call.type.toUpperCase()} at ${call.location.toUpperCase()}.`
                : `Attention all units, ${call.type} at ${call.location}.`;

            speak(message, call.severity);

            const duration = message.length * 50;
            setTimeout(() => {
                playUnkey();
            }, duration);

        }, 300);
    }

    // ---------------- USER INFO ----------------
    function loadUser() {
        const raw = localStorage.getItem("currentUser");
        if (!raw) return;
        const user = JSON.parse(raw);
        document.getElementById("userInfo").innerText =
            `Logged in as: ${user.name} (${user.badge}) – Role: ${user.role.toUpperCase()}`;
    }
    loadUser();

    // ---------------- CREATE CALL ----------------
    document.getElementById("createCallBtn").addEventListener("click", () => {
        const type = document.getElementById("callType").value.trim();
        const location = document.getElementById("callLocation").value.trim();
        const details = document.getElementById("callDetails").value.trim();
        const severity = document.getElementById("callSeverity").value;

        if (!type || !location) {
            alert("Type and location required.");
            return;
        }

        const call = {
            id: Date.now(),
            type,
            location,
            details,
            severity,
            timestamp: new Date().toLocaleString()
        };

        localStorage.setItem("newCall", JSON.stringify(call));
        addCallToList(call);
        dispatchCallAudio(call);
    });

    function addCallToList(call) {
        const list = document.getElementById("callList");
        const div = document.createElement("div");
        div.className = "call";
        div.innerHTML = `
            <strong>${call.type}</strong><br>
            ${call.location}<br>
            ${call.details}<br>
            <small>${call.timestamp} – Severity: ${call.severity}</small>
        `;
        list.prepend(div);
    }

    // ---------------- PANIC HANDLING ----------------
    function showPanic(panic) {
        const banner = document.getElementById("panicBanner");
        banner.style.display = "block";
        banner.innerText = `PANIC BUTTON ACTIVATED BY ${panic.badge} (${panic.name}) – ${panic.location || "Unknown location"}`;

        playKeyUp();
        setTimeout(() => {
            speak(`Panic button activated by ${panic.badge}.`, "high");
            const duration = 2000;
            setTimeout(() => playUnkey(), duration);
        }, 300);
    }

    window.addEventListener("storage", (e) => {
        if (e.key === "panicEvent") {
            const panic = JSON.parse(e.newValue);
            showPanic(panic);
        }
    });
</script>

</body>
</html>
