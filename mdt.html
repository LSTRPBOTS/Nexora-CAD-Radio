<!DOCTYPE html>
<html>
<head>
    <title>MDT</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; }
        nav { background:#000; padding:10px; }
        nav a { color:#fff; margin-right:15px; text-decoration:none; }
        .container { padding:20px; display:flex; gap:20px; }
        .panel {
            flex:1; background:#222; padding:15px;
            border-radius:6px; border:1px solid #333;
        }
        .call {
            border:1px solid #444; padding:8px; margin-top:8px;
            background:#181818;
        }
        button, select {
            padding:6px; margin-top:6px;
            background:#333; color:#fff; border:1px solid #555;
            cursor:pointer;
        }
        h2 { margin-top:0; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
    <a href="admin.html">Admin</a>
    <a href="settings.html">Settings</a>
</nav>

<div class="container">
    <div class="panel">
        <h2>Unit Info</h2>
        <div id="unitInfo"></div>
    </div>

    <div class="panel">
        <h2>Assigned Calls</h2>
        <div id="assignedCalls"></div>
    </div>

    <div class="panel">
        <h2>All Calls</h2>
        <div id="allCalls"></div>
    </div>
</div>

<script>
const rawUser = localStorage.getItem("currentUser");
if (!rawUser) window.location.href = "index.html";
const currentUser = JSON.parse(rawUser);

document.getElementById("unitInfo").innerText =
    `Logged in as: ${currentUser.name} (${currentUser.badge})`;

function loadCalls() {
    return JSON.parse(localStorage.getItem("calls")) || [];
}

function renderMDT() {
    const calls = loadCalls();
    const myBadge = currentUser.badge;

    const assignedBox = document.getElementById("assignedCalls");
    const allBox = document.getElementById("allCalls");

    assignedBox.innerHTML = "";
    allBox.innerHTML = "";

    if (!calls.length) {
        assignedBox.innerHTML = "<em>No calls.</em>";
        allBox.innerHTML = "<em>No calls.</em>";
        return;
    }

    calls.forEach(call => {
        const block = document.createElement("div");
        block.className = "call";
        block.innerHTML = `
            <strong>Call #${call.id}</strong><br>
            Type: ${call.type}<br>
            Location: ${call.location}<br>
            Status: ${call.status}<br>
            Units: ${call.units.join(", ") || "None"}<br>
        `;

        const isMine = call.units.includes(myBadge);

        if (isMine) {
            const myBlock = block.cloneNode(true);

            // Status controls for THIS unit’s MDT
            const statusSelect = document.createElement("select");
            ["Pending","En Route","On Scene","Closed"].forEach(st => {
                const opt = document.createElement("option");
                opt.value = st;
                opt.textContent = st;
                if (call.status === st) opt.selected = true;
                statusSelect.appendChild(opt);
            });

            const btn = document.createElement("button");
            btn.textContent = "Update Status";
            btn.onclick = () => {
                updateCallStatus(call.id, statusSelect.value);
            };

            myBlock.appendChild(document.createElement("br"));
            myBlock.appendChild(statusSelect);
            myBlock.appendChild(btn);

            assignedBox.appendChild(myBlock);
        }

        allBox.appendChild(block);
    });
}

function updateCallStatus(callId, status) {
    const calls = loadCalls();
    const idx = calls.findIndex(c => c.id === callId);
    if (idx === -1) return;
    calls[idx].status = status;
    localStorage.setItem("calls", JSON.stringify(calls));
    renderMDT();
}

// Poll every 2 seconds so MDT sees CAD changes
setInterval(renderMDT, 2000);
renderMDT();
</script>

</body>
</html>
