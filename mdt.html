<!DOCTYPE html>
<html>
<head>
    <title>MDT</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        nav {
            background: #000;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
        }
        #calls .call {
            border: 1px solid #444;
            padding: 8px;
            margin-top: 8px;
        }
        button {
            padding: 6px 10px;
            margin-right: 5px;
            margin-top: 5px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
        }
        #panicBtn {
            background: darkred;
        }
    </style>
</head>
<body>

<nav>
    <a href="login.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
</nav>

<div class="container">
    <h1>MDT – Unit Terminal</h1>
    <div id="userInfo"></div>

    <button id="panicBtn">PANIC</button>

    <div id="calls">
        <h3>Assigned / Active Calls</h3>
        <div id="callList"></div>
    </div>
</div>

<script>
    // ------------- TTS + BEEPS -------------
    function playKeyUp() {
        new Audio("/tones/unit_keyup.mp3").play();
    }

    function playUnkey() {
        new Audio("/tones/unit_unkey.mp3").play();
    }

    function speak(text, severity = "normal") {
        const msg = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
        msg.voice = maleVoice;

        if (severity === "high") {
            msg.rate = 1.2;
            msg.pitch = 0.9;
            msg.volume = 1;
        } else {
            msg.rate = 0.9;
            msg.pitch = 0.8;
            msg.volume = 0.9;
        }

        speechSynthesis.speak(msg);
    }

    // ------------- USER INFO -------------
    let currentUser = null;
    function loadUser() {
        const raw = localStorage.getItem("currentUser");
        if (!raw) return;
        currentUser = JSON.parse(raw);
        document.getElementById("userInfo").innerText =
            `Logged in as: ${currentUser.name} (${currentUser.badge}) – Role: ${currentUser.role.toUpperCase()}`;
    }
    loadUser();

    // ------------- CALL HANDLING -------------
    function addCallToMDT(call) {
        const list = document.getElementById("callList");
        const div = document.createElement("div");
        div.className = "call";
        div.innerHTML = `
            <strong>${call.type}</strong><br>
            ${call.location}<br>
            ${call.details || ""}<br>
            <small>${call.timestamp} – Severity: ${call.severity}</small><br>
            <button onclick="setStatus(this, 'En Route')">En Route</button>
            <button onclick="setStatus(this, 'On Scene')">On Scene</button>
            <button onclick="setStatus(this, 'Clear')">Clear</button>
            <span class="statusLabel"></span>
        `;
        list.prepend(div);

        playKeyUp();
        setTimeout(() => {
            speak(`New call: ${call.type} at ${call.location}.`, call.severity);
            const duration = 2000;
            setTimeout(() => playUnkey(), duration);
        }, 300);
    }

    function setStatus(btn, status) {
        const parent = btn.parentElement;
        const label = parent.querySelector(".statusLabel");
        label.innerText = `Status: ${status}`;
    }

    window.addEventListener("storage", (e) => {
        if (e.key === "newCall") {
            const call = JSON.parse(e.newValue);
            addCallToMDT(call);
        }
    });

    // ------------- PANIC BUTTON -------------
    document.getElementById("panicBtn").addEventListener("click", () => {
        if (!currentUser) {
            alert("No user logged in.");
            return;
        }

        const panic = {
            name: currentUser.name,
            badge: currentUser.badge,
            role: currentUser.role,
            timestamp: new Date().toLocaleString(),
            location: "Unknown" // you can wire GPS or manual later
        };

        localStorage.setItem("panicEvent", JSON.stringify(panic));

        playKeyUp();
        setTimeout(() => {
            speak("Panic button activated.", "high");
            const duration = 2000;
            setTimeout(() => playUnkey(), duration);
        }, 300);
    });
</script>

</body>
</html>
