<!DOCTYPE html>
<html lang="en">
<head>
  <title>Nexora Radio - System Stable</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    .display-panel { background: #f4f4f4; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
    #modeBadge { display: inline-block; background: #007bff; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .controls { margin-top: 15px; }
    select, input { margin-bottom: 10px; display: block; width: 100%; max-width: 300px; }
  </style>
</head>
<body>

  <h2>Nexora Radio</h2>

  <div class="display-panel">
    <div id="modeBadge">---</div>
    <div id="freqDisplay" style="font-size: 1.2rem; font-weight: bold;">Freq: ---</div>
    <div id="statusText">Status: Idle</div>
  </div>

  <label>Zone Selection</label>
  <select id="zoneSelect"></select>

  <label>Channel Selection</label>
  <select id="channelSelect"></select>

  <hr>

  <div class="controls">
    <label>Manual Frequency</label>
    <input type="text" id="freqInput" placeholder="e.g. 155.000">
    <button id="setFreqBtn">Set Frequency</button>
  </div>

  <div class="controls">
    <button id="ptt" style="padding: 10px 20px; cursor: pointer;">PTT (Transmit)</button>
    <button id="quickPTT" style="display:none;">Quick TX</button>
  </div>

  <div class="controls">
    <label>
      <input type="checkbox" id="quickToggle"> Enable Quick TX
    </label>
    <button id="syncFromGovBtn">Sync from HQ</button>
  </div>

  <script src="radio.js"></script>
</body>
</html>
