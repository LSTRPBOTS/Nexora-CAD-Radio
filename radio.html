<!DOCTYPE html>
<html>
<head>
  <title>Nexora Radio</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin:0;
      background:#0d0f12;
      color:#fff;
      font-family:Arial, sans-serif;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* LEFT PANEL */
    #panel {
      width:340px;
      background:#14181d;
      border-right:2px solid #1f252d;
      padding:20px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    #identity {
      font-size:18px;
      color:#4aa3ff;
      margin-bottom:10px;
    }

    label {
      font-size:12px;
      color:#9fa8b8;
    }

    select, input, button {
      width:100%;
      padding:10px;
      background:#1c222b;
      color:#fff;
      border:1px solid #2a323d;
      box-sizing:border-box;
    }

    button {
      background:#4aa3ff;
      cursor:pointer;
    }

    button:active {
      background:#2f7fcc;
    }

    /* MAIN */
    #main {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      position:relative;
    }

    #ptt {
      width:220px;
      height:220px;
      border-radius:50%;
      background:#4aa3ff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      user-select:none;
      cursor:pointer;
    }

    #statusText {
      margin-top:20px;
      color:#9fa8b8;
    }

    /* QUICK TX */
    #quickPTT {
      position:absolute;
      bottom:20px;
      right:20px;
      width:140px;
      padding:12px;
      display:none;
      background:#ff9f43;
      border:none;
      cursor:pointer;
    }

    #quickPTT.active {
      background:#ff5e3a;
    }

    /* RIGHT PANEL */
    #setupWrapper {
      width:340px;
      background:#14181d;
      border-left:2px solid #1f252d;
      display:flex;
      flex-direction:column;
    }

    #setupHeader {
      padding:10px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #2a323d;
    }

    #setupPanel {
      padding:20px;
      overflow:auto;
      flex:1;
    }

    #modeBadge {
      padding:4px 8px;
      background:#2a323d;
      display:inline-block;
      margin-top:5px;
      font-size:12px;
    }
  </style>
</head>

<body>

  <!-- LEFT -->
  <div id="panel">
    <div id="identity">Nexora Radio</div>

    <label>Zone</label>
    <select id="zoneSelect"></select>

    <label>Channel</label>
    <select id="channelSelect"></select>

    <label>Mode</label>
    <div id="modeBadge">---</div>

    <div id="freqDisplay">Freq: ---</div>

    <label>Custom Frequency</label>
    <input id="freqInput" placeholder="frequency">
    <button id="setFreqBtn">Set Frequency</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="ptt">PTT</div>
    <div id="statusText">Idle</div>

    <!-- QUICK TX BUTTON -->
    <button id="quickPTT">⚡ Quick TX</button>
  </div>

  <!-- RIGHT -->
  <div id="setupWrapper">
    <div id="setupHeader">
      <span>Setup</span>
      <button id="setupToggleBtn">Collapse</button>
    </div>

    <div id="setupPanel">

      <h3>Radio Options</h3>

      <!-- REQUIRED FOR JS -->
      <label>
        <input type="checkbox" id="quickToggle">
        Enable Quick-Access TX
      </label>

      <hr>

      <h3>Sync</h3>
      <button id="syncFromGovBtn">Sync Now</button>

    </div>
  </div>

  <script src="radio.js"></script>
</body>
</html>
