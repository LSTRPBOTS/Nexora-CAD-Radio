<!DOCTYPE html>
<html>
<head>
    <title>Radio</title>
    <style>
        body { background:#111; color:white; font-family:Arial; }
        nav { background:#000; padding:10px; }
        nav a { color:#fff; margin-right:15px; text-decoration:none; }
        .container { padding:20px; text-align:center; }
        #radioFace {
            width:400px; height:500px; margin:20px auto;
            background-size:contain; background-repeat:no-repeat;
            background-position:center; position:relative;
            border:1px solid #333;
        }
        #talkOverlay {
            position:absolute; top:10px; left:10px;
            padding:8px 12px; background:rgba(0,0,0,0.7);
            color:#fff; border-radius:4px; display:none;
            text-align:left; font-size:14px;
        }
        #controls {
            margin-top:20px;
        }
        #pttBtn, #panicBtn {
            padding:12px 20px; margin:5px;
            background:#333; color:#fff; border:1px solid #555;
            cursor:pointer; font-size:16px;
        }
        #pttBtn:active { background:#555; }
        #panicBtn { background:darkred; border-color:#aa0000; }
    </style>
</head>
<body>

<nav>
    <a href="./index.html">Login</a>
    <a href="./cad.html">CAD</a>
    <a href="./mdt.html">MDT</a>
    <a href="./radio.html">Radio</a>
    <a href="./admin.html">Admin</a>
    <a href="./settings.html">Settings</a>
</nav>

<div class="container">
    <h1>Radio</h1>
    <div id="userInfo"></div>
    <div id="freqInfo"></div>

    <div id="radioFace">
        <div id="talkOverlay"></div>
    </div>

    <div id="controls">
        <button id="pttBtn">PTT</button>
        <button id="panicBtn">PANIC</button>
    </div>
</div>

<script>
// ---- load user ----
const rawUser = localStorage.getItem("currentUser");
if (!rawUser) window.location.href = "./index.html";
const currentUser = JSON.parse(rawUser);

document.getElementById("userInfo").innerText =
    `Logged in as: ${currentUser.name} (${currentUser.badge})`;

const s = currentUser.settings || {};
let currentFrequency = s.frequency || "154.890";
document.getElementById("freqInfo").innerText = `Frequency / TG: ${currentFrequency}`;

const face = document.getElementById("radioFace");
if (s.radioImage) face.style.backgroundImage = `url('${s.radioImage}')`;

const pttKey = s.pttKey || "KeyT";
const panicKey = s.panicKey || "KeyP";
document.getElementById("panicBtn").innerText = s.panicButtonLabel || "PANIC";

const talkOverlay = document.getElementById("talkOverlay");

// ---- tones ----
function playTone(type) {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.frequency.value = type === "key" ? 1000 : 600;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); ctx.close(); }, 120);
}

// ---- who is talking ----
function showTalking(user) {
    if (!s.showWhoIsTalking) return;
    talkOverlay.innerText = `${user.name} (${user.badge})\n${currentFrequency}`;
    talkOverlay.style.display = "block";
}
function hideTalking() {
    talkOverlay.style.display = "none";
}

// ---- WebRTC radio ----
let localStream = null;
let peers = {};
const myId = currentUser.badge + "-" + Math.random().toString(16).slice(2);

const socket = new WebSocket("ws://localhost:8080");


socket.onopen = () => {
    socket.send(JSON.stringify({
        type: "join",
        id: myId,
        frequency: currentFrequency
    }));
};

socket.onmessage = async (event) => {
    const data = JSON.parse(event.data);

    if (data.id === myId) return;
    if (data.frequency && data.frequency !== currentFrequency) return;

    if (data.type === "join") {
        const pc = createPeer(data.id);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.send(JSON.stringify({
            type: "offer",
            from: myId,
            to: data.id,
            offer,
            frequency: currentFrequency
        }));
    }

    if (data.type === "offer" && data.to === myId) {
        const pc = createPeer(data.from);
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.send(JSON.stringify({
            type: "answer",
            from: myId,
            to: data.from,
            answer,
            frequency: currentFrequency
        }));
    }

    if (data.type === "answer" && data.to === myId) {
        const pc = peers[data.from];
        if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    }

    if (data.type === "candidate" && data.to === myId) {
        const pc = peers[data.from];
        if (pc && data.candidate) {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch (e) {
                console.error(e);
            }
        }
    }
};

function createPeer(id) {
    if (peers[id]) return peers[id];

    const pc = new RTCPeerConnection();

    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.send(JSON.stringify({
                type: "candidate",
                from: myId,
                to: id,
                candidate: event.candidate,
                frequency: currentFrequency
            }));
        }
    };

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
        showTalking({ name: "Unit", badge: id });
        setTimeout(hideTalking, 500);
    };

    if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }

    peers[id] = pc;
    return pc;
}

// ---- PTT ----
async function startTX() {
    if (localStream) return;

    playTone("key");

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
        alert("Mic access denied.");
        return;
    }

    Object.values(peers).forEach(pc => {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    });

    showTalking(currentUser);
}

function stopTX() {
    if (!localStream) return;

    playTone("unkey");

    localStream.getTracks().forEach(t => t.stop());
    localStream = null;

    hideTalking();
}

// ---- buttons + keys ----
document.getElementById("pttBtn").addEventListener("mousedown", startTX);
document.getElementById("pttBtn").addEventListener("mouseup", stopTX);
document.getElementById("pttBtn").addEventListener("mouseleave", stopTX);

document.getElementById("panicBtn").addEventListener("click", () => {
    alert("PANIC triggered (you can later broadcast this over all freqs).");
});

document.addEventListener("keydown", (e) => {
    if (e.code === pttKey) startTX();
    if (e.code === panicKey) {
        alert("PANIC triggered via hotkey.");
    }
});
document.addEventListener("keyup", (e) => {
    if (e.code === pttKey) stopTX();
});
</script>

</body>
</html>
