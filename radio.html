<!DOCTYPE html>
<html>
<head>
    <title>Radio</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }
        nav {
            background: #000;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }
        #radioAlert {
            background: red;
            padding: 10px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
        #ptt {
            padding: 15px;
            font-size: 18px;
            background: #333;
            color: white;
            border: 2px solid #555;
            cursor: pointer;
            margin-top: 20px;
        }
        #ptt:active {
            background: #555;
        }
        .container {
            padding: 20px;
        }
        #userInfo {
            margin-bottom: 10px;
        }
        #panicBanner {
            background: darkred;
            padding: 10px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav>
    <a href="login.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
</nav>

<div class="container">
    <h1>Radio</h1>
    <div id="userInfo"></div>

    <label>Channel:</label>
    <select id="radioChannel">
        <option>Dispatch</option>
        <option>LEO 1</option>
        <option>Fire/EMS</option>
        <option>DOT</option>
    </select>

    <br><br>

    <button id="ptt">Push To Talk</button>

    <div id="radioAlert"></div>
    <div id="panicBanner"></div>
</div>

<script>
    // ------------- TTS + BEEPS -------------
    function playKeyUp() {
        new Audio("/tones/unit_keyup.mp3").play();
    }

    function playUnkey() {
        new Audio("/tones/unit_unkey.mp3").play();
    }

    function speak(text, severity = "normal") {
        const msg = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
        msg.voice = maleVoice;

        if (severity === "high") {
            msg.rate = 1.2;
            msg.pitch = 0.9;
            msg.volume = 1;
        } else {
            msg.rate = 0.9;
            msg.pitch = 0.8;
            msg.volume = 0.9;
        }

        speechSynthesis.speak(msg);
    }

    // ------------- USER INFO -------------
    let currentUser = null;
    function loadUser() {
        const raw = localStorage.getItem("currentUser");
        if (!raw) return;
        currentUser = JSON.parse(raw);
        document.getElementById("userInfo").innerText =
            `Logged in as: ${currentUser.name} (${currentUser.badge}) – Role: ${currentUser.role.toUpperCase()}`;
    }
    loadUser();

    // ------------- UNIT PTT -------------
    document.getElementById("ptt").addEventListener("mousedown", () => {
        playKeyUp();
    });

    document.getElementById("ptt").addEventListener("mouseup", () => {
        const unitId = currentUser ? currentUser.badge : "Unknown unit";
        const text = `${unitId}, test transmission.`;
        const duration = text.length * 50;

        speak(text, "normal");

        setTimeout(() => {
            playUnkey();
        }, duration);
    });

    // ------------- DISPATCH CALL AUDIO -------------
    function dispatchCall(call) {
        playKeyUp();

        setTimeout(() => {
            const message = call.severity === "high"
                ? `ATTENTION ALL UNITS! ${call.type.toUpperCase()} at ${call.location.toUpperCase()}.`
                : `Attention all units, ${call.type} at ${call.location}.`;

            speak(message, call.severity);

            const duration = message.length * 50;
            setTimeout(() => {
                playUnkey();
            }, duration);

        }, 300);
    }

    // ------------- RADIO ALERT BANNER -------------
    function showRadioAlert(call) {
        const alertBox = document.getElementById("radioAlert");
        alertBox.innerHTML = `NEW CALL: ${call.type} @ ${call.location}`;
        alertBox.style.display = "block";

        setTimeout(() => {
            alertBox.style.display = "none";
        }, 5000);
    }

    // ------------- PANIC BANNER -------------
    function showPanic(panic) {
        const banner = document.getElementById("panicBanner");
        banner.style.display = "block";
        banner.innerText = `PANIC: ${panic.badge} (${panic.name}) – ${panic.location || "Unknown location"}`;

        playKeyUp();
        setTimeout(() => {
            speak(`Panic button activated by ${panic.badge}.`, "high");
            const duration = 2000;
            setTimeout(() => playUnkey(), duration);
        }, 300);
    }

    // ------------- STORAGE EVENTS -------------
    window.addEventListener("storage", (e) => {
        if (e.key === "newCall") {
            const call = JSON.parse(e.newValue);
            showRadioAlert(call);
            dispatchCall(call);
        }

        if (e.key === "panicEvent") {
            const panic = JSON.parse(e.newValue);
            showPanic(panic);
        }
    });
</script>

</body>
</html>
