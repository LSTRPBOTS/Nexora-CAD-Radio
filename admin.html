<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; }
        nav { background:#000; padding:10px; }
        nav a { color:#fff; margin-right:15px; text-decoration:none; }
        .container { padding:20px; }
        input, button {
            padding:10px; margin-top:10px;
            background:#222; color:#fff; border:1px solid #555;
        }
        button { cursor:pointer; }
        .listBox div {
            border:1px solid #444; padding:10px; margin-top:10px;
        }
        .listBox button {
            background:darkred; border:1px solid #aa0000;
        }
        h2 { margin-top:40px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
    <a href="admin.html">Admin</a>
    <a href="settings.html">Settings</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">
    <h1>Admin Panel</h1>
    <div id="userInfo"></div>

    <h2>Add Admin</h2>
    <input id="adminName" placeholder="Name">
    <input id="adminBadge" placeholder="Badge / Unit ID">
    <button onclick="addAdminUI()">Add Admin</button>

    <h3>Admin List</h3>
    <div id="adminList" class="listBox"></div>

    <h2>Add Unit (CAD/MDT)</h2>
    <input id="unitName" placeholder="Officer Name">
    <input id="unitBadge" placeholder="Unit ID (1A-12)">
    <button onclick="addUnitUI()">Add Unit</button>

    <h3>Unit List</h3>
    <div id="unitList" class="listBox"></div>

    <h2>Add Dispatcher</h2>
    <input id="dispName" placeholder="Dispatcher Name">
    <input id="dispBadge" placeholder="Dispatcher ID">
    <button onclick="addDispatcherUI()">Add Dispatcher</button>

    <h3>Dispatcher List</h3>
    <div id="dispatcherList" class="listBox"></div>
</div>

<script>
const rawUser = localStorage.getItem("currentUser");
if (!rawUser) window.location.href = "index.html";
const currentUser = JSON.parse(rawUser);

document.getElementById("userInfo").innerText =
    `Logged in as: ${currentUser.name} (${currentUser.badge}) – Role: ${currentUser.role.toUpperCase()}`;

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
}

function loadList(key) {
    const saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : [];
}

function saveList(key, list) {
    localStorage.setItem(key, JSON.stringify(list));
}

// Admins
function addAdmin(name, badge) {
    const list = loadList("adminList");
    list.push({ name, badge });
    saveList("adminList", list);
}
function removeAdmin(badge) {
    let list = loadList("adminList");
    list = list.filter(a => a.badge !== badge);
    saveList("adminList", list);
}
function addAdminUI() {
    const name = adminName.value.trim();
    const badge = adminBadge.value.trim();
    if (!name || !badge) return alert("Enter name and badge.");
    addAdmin(name, badge);
    renderAdmins();
    adminName.value = "";
    adminBadge.value = "";
}
function renderAdmins() {
    const list = loadList("adminList");
    adminList.innerHTML = "";
    list.forEach(a => {
        adminList.innerHTML += `
            <div>
                <strong>${a.name}</strong> (${a.badge})
                <br>
                <button onclick="removeAdmin('${a.badge}'); renderAdmins();">Remove</button>
            </div>`;
    });
}

// Units
function addUnit(name, badge) {
    const list = loadList("unitList");
    list.push({ name, badge });
    saveList("unitList", list);
}
function removeUnit(badge) {
    let list = loadList("unitList");
    list = list.filter(u => u.badge !== badge);
    saveList("unitList", list);
}
function addUnitUI() {
    const name = unitName.value.trim();
    const badge = unitBadge.value.trim();
    if (!name || !badge) return alert("Enter name and unit ID.");
    addUnit(name, badge);
    renderUnits();
    unitName.value = "";
    unitBadge.value = "";
}
function renderUnits() {
    const list = loadList("unitList");
    unitList.innerHTML = "";
    list.forEach(u => {
        unitList.innerHTML += `
            <div>
                <strong>${u.name}</strong> (${u.badge})
                <br>
                <button onclick="removeUnit('${u.badge}'); renderUnits();">Remove</button>
            </div>`;
    });
}

// Dispatchers
function addDispatcher(name, badge) {
    const list = loadList("dispatcherList");
    list.push({ name, badge });
    saveList("dispatcherList", list);
}
function removeDispatcher(badge) {
    let list = loadList("dispatcherList");
    list = list.filter(d => d.badge !== badge);
    saveList("dispatcherList", list);
}
function addDispatcherUI() {
    const name = dispName.value.trim();
    const badge = dispBadge.value.trim();
    if (!name || !badge) return alert("Enter dispatcher name and ID.");
    addDispatcher(name, badge);
    renderDispatchers();
    dispName.value = "";
    dispBadge.value = "";
}
function renderDispatchers() {
    const list = loadList("dispatcherList");
    dispatcherList.innerHTML = "";
    list.forEach(d => {
        dispatcherList.innerHTML += `
            <div>
                <strong>${d.name}</strong> (${d.badge})
                <br>
                <button onclick="removeDispatcher('${d.badge}'); renderDispatchers();">Remove</button>
            </div>`;
    });
}

renderAdmins();
renderUnits();
renderDispatchers();
</script>

</body>
</html>
