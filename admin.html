<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        nav {
            background: #000;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
        }
        button {
            cursor: pointer;
        }
        #adminList div {
            border: 1px solid #444;
            padding: 10px;
            margin-top: 10px;
        }
        #adminList button {
            background: darkred;
            border: 1px solid #aa0000;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
    <a href="admin.html">Admin</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="container">
    <h1>Admin Panel</h1>
    <div id="userInfo"></div>

    <h2>Add Admin</h2>
    <input id="adminName" placeholder="Name">
    <input id="adminBadge" placeholder="Badge / Unit ID">
    <button onclick="addAdminUI()">Add Admin</button>

    <h2>Admin List</h2>
    <div id="adminList"></div>
</div>

<script>
    // ---------------- LOGIN ENFORCEMENT ----------------
    const rawUser = localStorage.getItem("currentUser");
    if (!rawUser) {
        window.location.href = "index.html";
    }
    const currentUser = JSON.parse(rawUser);

    document.getElementById("userInfo").innerText =
        `Logged in as: ${currentUser.name} (${currentUser.badge}) – Role: ${currentUser.role.toUpperCase()}`;

    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "index.html";
    }

    // ---------------- PERMANENT ADMIN STORAGE ----------------
    function loadAdmins() {
        const saved = localStorage.getItem("adminList");
        if (saved) {
            return JSON.parse(saved);
        }
        return []; // only empty if nothing saved yet
    }

    function saveAdmins(list) {
        localStorage.setItem("adminList", JSON.stringify(list));
    }

    function addAdmin(name, badge) {
        const admins = loadAdmins();
        admins.push({ name, badge });
        saveAdmins(admins);
    }

    function removeAdmin(badge) {
        let admins = loadAdmins();
        admins = admins.filter(a => a.badge !== badge);
        saveAdmins(admins);
    }

    // ---------------- UI FUNCTIONS ----------------
    function addAdminUI() {
        const name = document.getElementById("adminName").value.trim();
        const badge = document.getElementById("adminBadge").value.trim();

        if (!name || !badge) {
            alert("Enter name and badge.");
            return;
        }

        addAdmin(name, badge);
        renderAdmins();

        document.getElementById("adminName").value = "";
        document.getElementById("adminBadge").value = "";
    }

    function renderAdmins() {
        const admins = loadAdmins();
        const box = document.getElementById("adminList");
        box.innerHTML = "";

        admins.forEach(a => {
            const div = document.createElement("div");
            div.innerHTML = `
                <strong>${a.name}</strong> (${a.badge})
                <br>
                <button onclick="removeAdmin('${a.badge}'); renderAdmins();">Remove</button>
            `;
            box.appendChild(div);
        });
    }

    // INITIAL RENDER
    renderAdmins();
</script>

</body>
</html>
