<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body { background:#111; color:white; font-family:Arial; padding:20px; }
    input, button { padding:10px; margin:5px; }
    .box { background:#222; padding:15px; border:1px solid #333; margin-bottom:20px; }
  </style>
</head>
<body>

<h1>Admin Panel</h1>
<div id="userInfo"></div>

<div class="box">
  <h2>Add Government Official</h2>
  <input id="govUser" placeholder="Username">
  <input id="govPass" placeholder="Password">
  <input id="govBadge" placeholder="Badge Number">
  <button onclick="addGov()">Add Official</button>
</div>

<div class="box">
  <h2>Existing Government Officials</h2>
  <div id="govList"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
