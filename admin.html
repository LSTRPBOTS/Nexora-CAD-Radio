<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      background: #0d0f12;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      color: #4aa3ff;
      margin-bottom: 20px;
    }

    .section {
      background: #111418;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: 2px solid #1e2630;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #0f1317;
      border: 1px solid #1f2730;
      color: white;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #4aa3ff;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2d8be6;
    }

    .listBox {
      background: #0f1317;
      padding: 15px;
      border-radius: 5px;
      border: 1px solid #1f2730;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<div class="title">Admin Panel</div>

<!-- ADD OFFICER -->
<div class="section">
  <h2>Add Officer</h2>

  <input id="badge" placeholder="Badge Number">
  <input id="callsign" placeholder="Callsign">
  <input id="department" placeholder="Department">

  <select id="rank">
    <option>Officer</option>
    <option>Cadet</option>
    <option>Recruit</option>
    <option>Detective</option>
    <option>Investigator</option>
    <option>Sergeant</option>
    <option>Lieutenant</option>
    <option>Captain</option>
    <option>Major</option>
    <option>Superintendent</option>
    <option>Colonel</option>
  </select>

  <button onclick="addOfficer()">Add Officer</button>
</div>

<!-- ADD DISPATCH MEMBER -->
<div class="section">
  <h2>Add Dispatch Member</h2>

  <input id="dBadge" placeholder="Dispatch Badge Number">
  <input id="dName" placeholder="Dispatcher Name">

  <button onclick="addDispatch()">Add Dispatcher</button>
</div>

<!-- OFFICER LIST -->
<div class="section">
  <h2>Officer List</h2>
  <div id="officerList" class="listBox"></div>
</div>

<!-- DISPATCH LIST -->
<div class="section">
  <h2>Dispatch Members</h2>
  <div id="dispatchList" class="listBox"></div>
</div>

<script src="admin.js"></script>

</body>
</html>
