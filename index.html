<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #0d0f12;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .loginBox {
      background: #111418;
      padding: 30px;
      width: 350px;
      border-radius: 10px;
      border: 2px solid #1e2630;
      text-align: center;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: #4aa3ff;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #0f1317;
      border: 1px solid #1f2730;
      color: white;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #4aa3ff;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2d8be6;
    }

    #error {
      margin-top: 15px;
      color: #ff4a4a;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>

<body>

<div class="loginBox">
  <div class="title">System Login</div>

  <input id="badge" placeholder="Enter Badge Number">

  <select id="mode">
    <option value="cad">CAD</option>
    <option value="mdt">MDT</option>
    <option value="dispatch">Dispatch</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="login()">Login</button>

  <div id="error"></div>
</div>

<script src="login.js"></script>

</body>
</html>
