<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 80px auto;
            background: #222;
            padding: 20px;
            border-radius: 8px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
        }
        button {
            cursor: pointer;
        }
        nav {
            background: #000;
            padding: 10px;
        }
        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<nav>
    <a href="login.html">Login</a>
    <a href="cad.html">CAD</a>
    <a href="mdt.html">MDT</a>
    <a href="radio.html">Radio</a>
</nav>

<div class="container">
    <h2>System Login</h2>

    <label>Display Name</label>
    <input id="name" placeholder="John Smith">

    <label>Badge / Unit ID</label>
    <input id="badge" placeholder="1A-12">

    <label>Role / Mode</label>
    <select id="role">
        <option value="cad">Dispatch / CAD</option>
        <option value="mdt">Unit / MDT</option>
        <option value="radio">Radio Only</option>
    </select>

    <button id="loginBtn">Login</button>
</div>

<script>
    document.getElementById("loginBtn").addEventListener("click", () => {
        const name = document.getElementById("name").value.trim();
        const badge = document.getElementById("badge").value.trim();
        const role = document.getElementById("role").value;

        if (!name || !badge) {
            alert("Enter name and badge/unit ID.");
            return;
        }

        const user = { name, badge, role };
        localStorage.setItem("currentUser", JSON.stringify(user));

        if (role === "cad") {
            window.location.href = "cad.html";
        } else if (role === "mdt") {
            window.location.href = "mdt.html";
        } else if (role === "radio") {
            window.location.href = "radio.html";
        }
    });
</script>

</body>
</html>
