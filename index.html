<!DOCTYPE html>
<html>
<head>
  <title>Nexora CAD Login</title>
  <style>
    body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:50px; }
    input, select, button { padding:10px; margin:5px; width:250px; }
    #error { color:red; margin-top:10px; }
  </style>
</head>
<body>

<h1>Nexora CAD System Login</h1>

<form onsubmit="login(); return false;">
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <input id="badge" placeholder="Badge / Unit ID"><br>

  <select id="role">
    <option>Officer</option>
    <option>Dispatch</option>
    <option>Government</option>
    <option>Admin</option>
  </select><br>

  <button type="submit">Login</button>
  <p id="error"></p>
</form>

<script src="login.js"></script>
</body>
</html>
